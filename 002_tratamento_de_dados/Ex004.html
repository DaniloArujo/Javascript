<!--Editando Stringos com os comandos s.lenght, s.ToUpperCase() e s.ToLowerCase().
    <br> == pula uma linha dentro do html
    <strong> s </strong> = negrito
-->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
         var  nome = window.prompt('Qual é o seu nome ?')
         document.writeln(`Olá, <strong>${nome}</strong> seu nome tem ${nome.length} letras`)
         document.writeln(`Seu nome em maiúsculas é ${nome.toUpperCase()}`)
    </script>
</body>
</html>
