<!-- Salva dois numeros em prompt, converte em number e imprime a soma dos dois números com os comandos Number.parseint(n), Number.parseFloat(n) e number(n). Pharseint e pharse float forçam o tipo.
    Para retornar a string devo ultilizar a função String(n) ou n.toString
    Template string para javascript = `Eu estou aprendendo ${variavel}`
    Para aumentar o numero de casas no float eu uso o comando n1.toFixed(2)
e para substituir a virgula pelo ponto usar o comando .replace('.',',')
 -->


 <!DOCTYPE html>
 <html lang="pt-br">
 <head>
     <meta charset="UTF-8">
     <meta http-equiv="X-UA-Compatible" content="IE=edge">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Meu primeiro programa</title>
     <style>
         body{
             background-color: rgb(20, 132, 236);
             color: white;
             font: normal 20pt arial; 
         }
 
     </style>
 </head>
 <body>
     <h1>Olá, mundo!</h1>
     <p>Me livrei na maldição</p>
     <script>
         var n1 = Number.parseFloat(window.prompt('Digite um numero: ')) 
         var n2 = Number(window.prompt('Digite um outro numero: '))
         var soma = n1 + n2 
         window.alert(`A soma entre ${n1} e ${n2} é igual a ${soma}.`)
     </script> 
 </body>
 </html>
