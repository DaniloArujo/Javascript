<!-- Existem três formas de inserir JS em uma página?
    head: linkando um arquivo javascript;
    body: escrevendo código entre as tags script;
    body: linkando um arquivo de script;
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inserindo JavaScript</title>
    <script src="js/scripts.js"></script>
</head>
<body>
    <script>
        console.log("Script no body!")
    </script>
    <h1>teste</h1>
    <script src="js/script2.js"></script>
</body>
</html>
